<!-- 预加载关键资源 -->
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="dns-prefetch" href="//cdn.jsdelivr.net">

<!-- 文章字体设置 Fonts -->
<script src="https://cdn.jsdelivr.net/npm/webfontloader@1.6.28/webfontloader.min.js"></script>
<script>
    (function() {
        const fontCSSUrls = [
            'https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.7.0/lxgwwenkai-bold.min.css',
            'https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.7.0/lxgwwenkai-light.min.css',
            'https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.7.0/lxgwwenkai-regular.min.css',
            'https://cdn.jsdelivr.net/npm/@fontsource/maple-mono/index.min.css'
        ];
        const families = ['LXGW WenKai', 'Maple Mono'];

        function injectStylesheets(urls) {
            urls.forEach(url => {
                const link = document.createElement('link');
                link.rel = 'stylesheet';
                link.href = url;
                link.crossOrigin = 'anonymous';
                document.head.appendChild(link);
            });
        }

        if (window.WebFont && typeof window.WebFont.load === 'function') {
            window.WebFont.load({
                custom: {
                    families: families,
                    urls: fontCSSUrls
                }
            });
        } else {
            injectStylesheets(fontCSSUrls);
        }
    })();
</script>
<noscript>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.7.0/lxgwwenkai-bold.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.7.0/lxgwwenkai-light.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.7.0/lxgwwenkai-regular.min.css">
    <link href="https://cdn.jsdelivr.net/npm/@fontsource/maple-mono/index.min.css" rel="stylesheet">
</noscript>
