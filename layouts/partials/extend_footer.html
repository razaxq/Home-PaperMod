    <script>
        if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
            (function () {
                // 智能内容检测器
                function checkContentReady() {
                    // 主内容选择器（根据实际页面结构调整）
                    const mainContentSelector = '.list, #top, .archive-posts, .post';
                    const target = document.querySelector(mainContentSelector);

                    if (target) {
                        initSequentialLoader();
                    } else {
                        const contentObserver = new MutationObserver((mutations, observer) => {
                            if (document.querySelector(mainContentSelector)) {
                                initSequentialLoader();
                                observer.disconnect();
                            }
                        });

                        contentObserver.observe(document.documentElement, {
                            childList: true,
                            subtree: true
                        });

                        // 安全后备：DOMContentLoaded
                        const backupInit = () => {
                            contentObserver.disconnect();
                            initSequentialLoader();
                        };
                        document.addEventListener('DOMContentLoaded', backupInit);
                        setTimeout(backupInit, 3000); // 最终安全保障
                    }
                }

                // 原始业务逻辑封装
                function initSequentialLoader() {
                    const createSequentialObserver = (selectors, delay) => {
                        const elementsRegistry = [];

                        selectors.forEach(selector => {
                            const elements = Array.from(document.querySelectorAll(selector));
                            elements.forEach(element => {
                                elementsRegistry.push({element, loaded: false, isImmediate: false});
                            });
                        });

                        // 立即加载元素标记
                        ['.archive-year', '.archive-year-header', '.archive-month', '.archive-month-header'].forEach(selector => {
                            document.querySelectorAll(selector).forEach(element => {
                                const item = elementsRegistry.find(i => i.element === element);
                                if (item) item.isImmediate = true;
                            });
                        });

                        // 元素排序逻辑
                        elementsRegistry.sort((a, b) => {
                            const aTop = a.element.getBoundingClientRect().top + window.pageYOffset;
                            const bTop = b.element.getBoundingClientRect().top + window.pageYOffset;
                            return aTop - bTop;
                        });

                        // 观察器核心逻辑
                        let isAnimating = false;
                        let lastProcessedY = -Infinity;
                        const observer = new IntersectionObserver(entries => {
                            if (!isAnimating && entries.some(e => e.isIntersecting && !e.target.classList.contains('loaded'))) {
                                isAnimating = true;
                                processVisibleElements();
                            }
                        }, {rootMargin: '20px 0px', threshold: [0, 0.5, 1]});

                        // 处理可见元素
                        const processVisibleElements = () => {
                            const viewportBottom = window.pageYOffset + window.innerHeight;

                            // 遍历 elementsRegistry，找到第一个未加载的可见元素
                            const nextItem = elementsRegistry.find(item => {
                                if (item.loaded) return false;
                                const itemTop = item.element.getBoundingClientRect().top; // 只调用一次
                                return (itemTop + window.pageYOffset) <= viewportBottom + 100;
                            });

                            if (!nextItem) {
                                isAnimating = false;
                                return;
                            }

                            nextItem.loaded = true;
                            nextItem.element.classList.add('loaded');

                            // 缓存 `top` 值，避免重复计算
                            lastProcessedY = nextItem.element.getBoundingClientRect().top + window.pageYOffset;

                            if (nextItem.isImmediate) {
                                return processVisibleElements();
                            }

                            setTimeout(processVisibleElements, delay);
                        };

                        // 初始化观察
                        elementsRegistry.forEach(item => observer.observe(item.element));

                        // 滚动处理
                        const scrollHandler = throttle(() => {
                            if (!isAnimating) {
                                const hasUnloaded = elementsRegistry.some(item =>
                                    !item.loaded &&
                                    (item.element.getBoundingClientRect().top + window.pageYOffset) <=
                                    window.pageYOffset + window.innerHeight + 100
                                );
                                if (hasUnloaded) {
                                    isAnimating = true;
                                    processVisibleElements();
                                }
                            }
                        }, 100);

                        window.addEventListener('scroll', scrollHandler);
                        setTimeout(() => !isAnimating && processVisibleElements(), 50);
                    };

                    // 节流函数
                    const throttle = (fn, wait) => {
                        let timeout;
                        return (...args) => {
                            if (!timeout) {
                                timeout = setTimeout(() => {
                                    fn(...args);
                                    timeout = null;
                                }, wait);
                            }
                        };
                    };

                    // 初始化调用
                    createSequentialObserver([
                        '.list > .main > *',
                        '#top > .main > *',
                        '.archive-year',
                        '.archive-month',
                        '.archive-posts > *',
                        '.post > *'
                    ], 70);
                }

                // SPA 切页后重新触发逐步加载（新内容默认 opacity:0，需要再跑一遍 loader 才能依次 .loaded）
                document.addEventListener('spa:loaded', function () {
                    initSequentialLoader();
                });

                // 启动检测
                if (performance.getEntriesByName('first-contentful-paint').length > 0) {
                    checkContentReady();
                } else if ('PerformanceObserver' in window) {
                    const observer = new PerformanceObserver((entries) => {
                        if (entries.getEntriesByName('first-contentful-paint').length > 0) {
                            checkContentReady();
                            observer.disconnect();
                        }
                    });
                    observer.observe({type: 'paint', buffered: true});
                } else {
                    // 降级到原逻辑（当 FCP 不可用时）
                    if (document.readyState !== 'loading') {
                        checkContentReady();
                    } else {
                        document.addEventListener('readystatechange', () =>
                            document.readyState === 'interactive' && checkContentReady()
                        );
                    }
                }
            })();
        }
    </script>

    <div>
        <script type="module">
            // 复制按钮初始化
            document.querySelectorAll('.copyButton').forEach(copyButton => {
                let parent = copyButton.parentElement?.nextElementSibling;
                if (!parent) return; // 避免 parent 为 null 时出错

                let codeElements = parent.querySelectorAll('code');
                if (codeElements.length < 2) return; // 避免访问不存在的索引

                let code = codeElements[1].innerText.trim().replace(/\n{2}/g, '\n');

                if (code) {
                    copyButton.addEventListener('click', () => {
                        if (navigator.clipboard) {
                            navigator.clipboard.writeText(code)
                        }
                    });
                }
            });

            // ========================== codes ==========================
            const codetabNodes = document.querySelectorAll('.codetab');
            codetabNodes.forEach(function (elem, idx) {
                const containerElem = elem;
                const codetabLinks = elem.querySelectorAll('.codetab__link');
                const codetabContents = elem.querySelectorAll('.codetab__content');

                // 如果 codetabContents 为空，检查对应顺序的 codetabLinks 是否有 active 状态
                if (codetabContents.length === 0) {
                    codetabLinks.forEach((link) => {
                        if (!link.classList.contains('active')) {
                            link.classList.add('active');
                        }
                    });
                    return;
                }

                if (!codetabLinks || codetabLinks.length === 0) {
                    return;
                }

                codetabLinks.forEach(function (link, index, self) {
                    link.onclick = function (e) {
                        // 标签页切换
                        for (let i = 0; i < self.length; ++i) {
                            if (index === parseInt(i, 10)) {
                                if (!self[i].classList.contains('active')) {
                                    self[i].classList.add('active');
                                }
                                if (codetabContents[i]) {
                                    codetabContents[i].classList.add('active');
                                    codetabContents[i].style.display = 'block';
                                }
                            } else {
                                self[i].classList.remove('active');
                                if (codetabContents[i]) {
                                    codetabContents[i].classList.remove('active');
                                    codetabContents[i].style.display = 'none';
                                }
                            }
                        }
                        // 复制按键切换
                        const codeNodes = containerElem.querySelectorAll('.codetab__content.active code');
                        let codeText = '';
                        if (codeNodes.length > 1) {
                            codeText = codeNodes[1].innerText;
                        } else if (codeNodes.length === 1) {
                            codeText = codeNodes[0].innerText;
                        }
                        codeText = codeText ? codeText.replace(/\n{2}/g, '\n') : '';

                        if (codeText) {
                            let copyButton = containerElem.querySelectorAll('.copyButton')[0];
                            if (copyButton) {
                                // 克隆copyButton并替换它自己来移除所有事件监听器
                                var newButton = copyButton.cloneNode(true);
                                copyButton.parentNode.replaceChild(newButton, copyButton);

                                // 在新的copyButton上添加事件监听器
                                newButton.addEventListener('click', function () {
                                    if (navigator.clipboard) {
                                        navigator.clipboard.writeText(codeText);
                                    }
                                });
                                // 更新copyButton变量引用到新的按钮，以便继续使用它
                                copyButton = newButton;
                            }
                        }
                    }
                });
            });
        </script>

<!-- ══════════════════════════════════════════════════════════
     ramos-modern JS v21 — SPA 风格（fetch + 内容替换）
     点击内链 → fetch HTML → 替换 <main> + <title> →
     重新执行新页面的 <script> → pushState → 平滑过渡
     ════════════════════════════════════════════════════════ -->
<script>
(function () {
    'use strict';

    var REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    var FADE_MS = REDUCED ? 0 : 180;

    /* progress-bar 移到 body */
    var pb = document.getElementById('progress-bar');
    if (pb && pb.parentNode !== document.body) document.body.appendChild(pb);

    /* ════════════════════════════════════════════════════════
       核心 A. 逐页执行的初始化器 —— 每次内容替换后都要重跑
       ════════════════════════════════════════════════════════ */
    function initPage() {
        initHeaderHide();
        initProgressBar();
        initTOC();
        initBackTop();

        /* Fancybox 重绑 */
        if (window.Fancybox && typeof window.Fancybox.bind === 'function') {
            try { window.Fancybox.unbind('[data-fancybox]'); } catch (e) {}
            try { window.Fancybox.bind('[data-fancybox]'); } catch (e) {}
        }

        /* Twikoo / 评论 —— 按需再加 */
    }

    /* ── Header 滚动隐藏 ── */
    var _headerState = null;
    function initHeaderHide() {
        var header = document.querySelector('.header');
        if (!header) return;
        if (_headerState) window.removeEventListener('scroll', _headerState.handler);
        var lastY = window.scrollY || 0, tick = false;
        function upd() {
            var y = window.scrollY, d = y - lastY;
            if (y < 80) header.classList.remove('scroll-hidden');
            else if (d > 2) header.classList.add('scroll-hidden');
            else if (d < -2) header.classList.remove('scroll-hidden');
            lastY = y; tick = false;
        }
        var handler = function () {
            if (!tick) { requestAnimationFrame(upd); tick = true; }
        };
        window.addEventListener('scroll', handler, { passive: true });
        _headerState = { handler: handler };
    }

    /* ── 进度条 ── */
    var _pbState = null;
    function initProgressBar() {
        if (!pb) return;
        if (_pbState) window.removeEventListener('scroll', _pbState.handler);
        var tick = false;
        function upd() {
            var total = document.documentElement.scrollHeight - window.innerHeight;
            pb.style.width = (total > 0 ? Math.min(100, Math.max(0, window.scrollY / total * 100)) : 0) + '%';
            tick = false;
        }
        var handler = function () {
            if (!tick) { requestAnimationFrame(upd); tick = true; }
        };
        window.addEventListener('scroll', handler, { passive: true });
        _pbState = { handler: handler };
        upd();
    }

    /* ── TOC 高亮 ── */
    var _tocState = null;
    function initTOC() {
        if (_tocState) window.removeEventListener('scroll', _tocState.handler);
        var tocLinks = document.querySelectorAll('.toc .inner a');
        if (!tocLinks.length) { _tocState = null; return; }
        var hm = [];
        tocLinks.forEach(function (a) {
            var h = a.getAttribute('href') || '', i = h.indexOf('#');
            var id = i >= 0 ? decodeURIComponent(h.slice(i + 1)) : '';
            var el = id && document.getElementById(id);
            if (el) hm.push({ el: el, a: a });
        });
        if (!hm.length) return;
        var cur = null;
        var hh = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--header-height')) || 60;
        var TH = hh + 24, tick = false;
        function upd() {
            var act = null;
            for (var i = 0; i < hm.length; i++) {
                if (hm[i].el.getBoundingClientRect().top <= TH) act = hm[i];
            }
            if (!act) act = hm[0];
            if (act !== cur) {
                cur = act;
                tocLinks.forEach(function (a) { a.classList.remove('active'); });
                act.a.classList.add('active');
            }
            tick = false;
        }
        var handler = function () {
            if (!tick) { requestAnimationFrame(upd); tick = true; }
        };
        window.addEventListener('scroll', handler, { passive: true });
        _tocState = { handler: handler };
        upd();
    }

    /* ── Back-top ── */
    var _btState = null;
    function initBackTop() {
        var topLink = document.querySelector('.top-link');
        if (!topLink) return;
        if (_btState) window.removeEventListener('scroll', _btState.handler);
        var tick = false;
        function upd() {
            if (window.scrollY > 400) topLink.classList.add('show');
            else topLink.classList.remove('show');
            tick = false;
        }
        var handler = function () {
            if (!tick) { requestAnimationFrame(upd); tick = true; }
        };
        window.addEventListener('scroll', handler, { passive: true });
        _btState = { handler: handler };
        upd();
    }

    /* ════════════════════════════════════════════════════════
       核心 B. SPA 路由
       ════════════════════════════════════════════════════════ */
    var host = location.host;
    /* 候选选择器，按顺序尝试；适配不同主题模板 */
    var MAIN_SELECTORS = ['main .main', 'main', '.main', '#main', '[role="main"]'];
    function getMain(root) {
        root = root || document;
        for (var i = 0; i < MAIN_SELECTORS.length; i++) {
            var el = root.querySelector(MAIN_SELECTORS[i]);
            if (el) return el;
        }
        return null;
    }
    var cache = new Map();
    var isNavigating = false;
    var lastPath = location.pathname;

    function isInternal(a) {
        if (!a || !a.href) return false;
        if (a.hasAttribute('data-fancybox')) return false;
        if (a.closest && a.closest('[data-fancybox],.fancybox__container,.fancybox__slide')) return false;
        if (/\.(jpe?g|png|gif|webp|avif|svg|bmp|mp4|pdf|zip)(\?.*)?$/i.test(a.href)) return false;
        try {
            var u = new URL(a.href);
            if (u.host !== host) return false;
            if (a.target === '_blank' || a.hasAttribute('download')) return false;
            return true;
        } catch (e) { return false; }
    }

    /* 解析 HTML 字符串为 document */
    function parseHTML(str) {
        var doc = document.implementation.createHTMLDocument('');
        doc.documentElement.innerHTML = str;
        return doc;
    }

    /* 同步 header #menu 的 active 高亮（SPA 只换 main，不换 header，所以要手动更新） */
    function syncMenuActive(newDoc) {
        var newMenu = newDoc.querySelector('#menu');
        var curMenu = document.querySelector('#menu');
        if (!newMenu || !curMenu) return;
        var activeHrefs = Object.create(null);
        newMenu.querySelectorAll('a').forEach(function (a) {
            var span = a.querySelector('span');
            if (span && span.classList.contains('active')) {
                activeHrefs[a.getAttribute('href')] = true;
            }
        });
        curMenu.querySelectorAll('a').forEach(function (a) {
            var span = a.querySelector('span');
            if (!span) return;
            if (activeHrefs[a.getAttribute('href')]) {
                span.classList.add('active');
            } else {
                span.classList.remove('active');
            }
        });
    }

    /* 重新执行指定容器内所有 <script>（innerHTML 注入的 script 不会自动执行） */
    function executeScripts(container) {
        var scripts = container.querySelectorAll('script');
        scripts.forEach(function (oldScript) {
            var newScript = document.createElement('script');
            /* 复制属性 */
            for (var i = 0; i < oldScript.attributes.length; i++) {
                var attr = oldScript.attributes[i];
                newScript.setAttribute(attr.name, attr.value);
            }
            if (oldScript.src) {
                /* 外链 script：只在未加载过时重新添加 */
                if (!document.querySelector('script[src="' + oldScript.src + '"]')) {
                    document.head.appendChild(newScript);
                }
            } else {
                newScript.textContent = oldScript.textContent;
                oldScript.parentNode.replaceChild(newScript, oldScript);
            }
        });
    }

    /* fetch + swap */
    function navigate(href, push) {
        if (isNavigating) return;
        isNavigating = true;

        var oldMain = getMain(document);
        if (!oldMain) { window.location.href = href; return; }

        /* 淡出 */
        oldMain.style.transition = 'opacity ' + FADE_MS + 'ms ease, transform ' + FADE_MS + 'ms ease';
        oldMain.style.opacity = '0';
        oldMain.style.transform = 'translateY(-8px)';
        oldMain.style.pointerEvents = 'none';

        var fetchP = cache.has(href)
            ? Promise.resolve(cache.get(href))
            : fetch(href, { credentials: 'same-origin' }).then(function (r) { return r.text(); });

        var fadeP = new Promise(function (res) { setTimeout(res, FADE_MS); });

        Promise.all([fetchP, fadeP]).then(function (arr) {
            var html = arr[0];
            cache.set(href, html);

            var doc = parseHTML(html);
            var newMain = getMain(doc);
            var newTitle = doc.querySelector('title');

            if (!newMain) {
                console.warn('[SPA] new page has no .main, fallback to hard nav');
                window.location.href = href;
                return;
            }

            /* 替换 main 的 innerHTML 而不是整个节点，保留父节点引用 */
            oldMain.innerHTML = newMain.innerHTML;
            /* 同步 class（可能有 post / list 等类） */
            oldMain.className = newMain.className;

            var mainAfter = oldMain;

            /* 替换 title */
            if (newTitle) document.title = newTitle.textContent;

            /* 同步 header #menu 的 active 高亮 */
            syncMenuActive(doc);

            /* 重新执行新 main 内的 script */
            executeScripts(mainAfter);

            /* pushState */
            if (push) history.pushState({ href: href }, '', href);
            lastPath = new URL(href, location.href).pathname;

            /* 滚动到顶 */
            window.scrollTo(0, 0);

            /* 清除淡出时留下的 inline 样式：
               - opacity/transform 让 main 立即回到可见位置（子元素由 CSS 默认 opacity:0 隐藏，稍后由 sequential loader 逐个 .loaded）
               - pointer-events 必须清掉，否则 main 内部的所有链接都会被穿透到 body，变成点不开 */
            mainAfter.style.transition = 'none';
            mainAfter.style.opacity = '';
            mainAfter.style.transform = '';
            mainAfter.style.pointerEvents = '';
            requestAnimationFrame(function () {
                mainAfter.style.transition = '';
            });

            /* 重新初始化 header / progress / TOC / back-top */
            initPage();

            /* 触发 spa:loaded：sequential loader 会监听并逐个给子元素加 .loaded，复现原始入场动画 */
            document.dispatchEvent(new CustomEvent('spa:loaded', { detail: { href: href } }));

            isNavigating = false;
        }).catch(function () {
            /* 失败兜底：直接硬跳 */
            window.location.href = href;
        });
    }

    /* 拦截点击 */
    document.addEventListener('click', function (e) {
        if (e.button !== 0 || e.metaKey || e.ctrlKey || e.shiftKey || e.altKey) return;
        var a = e.target.closest && e.target.closest('a');
        if (!isInternal(a)) return;

        var u = new URL(a.href);
        /* 同路径锚点 → 不拦截（让浏览器跳锚） */
        if (u.pathname === location.pathname && u.hash) return;

        e.preventDefault();
        navigate(a.href, true);
    }, true);

    /* 浏览器前进/后退：仅在 pathname 真的变化时才走 SPA，
       否则只是 hash 变动（如 Fancybox 关闭、锚点跳转）会误触发重新加载 */
    window.addEventListener('popstate', function () {
        if (location.pathname === lastPath) return;
        lastPath = location.pathname;
        navigate(location.href, false);
    });

    /* 首屏初始化 */
    initPage();
})();
</script>
