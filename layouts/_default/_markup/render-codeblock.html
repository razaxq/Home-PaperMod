{{- /*
  代码块渲染 hook —— 不再走 Hugo 内置 Chroma。
  这里只吐出一个"待 Shiki 处理"的占位符，build 结束后由
  scripts/shiki-render.mjs 扫描 public/ 下的 HTML，
  用 Shiki 把 pre.shiki-pending 替换成真正的高亮 HTML。
*/ -}}
{{- $id := substr (md5 .Inner) 0 16 -}}
{{- $lang := cond (eq .Type "") "plaintext" .Type -}}
<div id="{{ $id }}" class="codetab">
    <div class="codetab__links">
        <button class="codetab__link" aria-label="Tab link">{{ $lang }}</button>
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="copyButton">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.666 3.888A2.25 2.25 0 0 0 13.5 2.25h-3c-1.03 0-1.9.693-2.166 1.638m7.332 0c.055.194.084.4.084.612v0a.75.75 0 0 1-.75.75H9a.75.75 0 0 1-.75-.75v0c0-.212.03-.418.084-.612m7.332 0c.646.049 1.288.11 1.927.184 1.1.128 1.907 1.077 1.907 2.185V19.5a2.25 2.25 0 0 1-2.25 2.25H6.75A2.25 2.25 0 0 1 4.5 19.5V6.257c0-1.108.806-2.057 1.907-2.185a48.208 48.208 0 0 1 1.927-.184" />
        </svg>
    </div>
    <pre class="shiki-pending" data-lang="{{ $lang }}"><code>{{ .Inner }}</code></pre>
</div>
